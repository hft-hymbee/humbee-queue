<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PO Status Mail</title>
  </head>
  <body
    style="
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    "
  >
    <p>
      Dear $buyer_name<br /><br />
      We are sorry to inform you that your Purchase Order :
      <span>$order_booking_id</span>
      <br />has been rejected by your supplier : <span>$seller_name.</span><br />
    </p>
    <table style="border: 1px solid black; border-collapse: collapse">
      <tr>
        <th
          style="
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
          "
        >
          Base Product Name
        </th>
        <th
          style="
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
          "
        >
          Quantity
        </th>
         <th
          style="
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
          "
        >
          Price
        </th>
      </tr>
      $products_table
    </table>
    <br />
      Best Regards,<br />
      Team Humbee
    </p>
  </body>
</html>
